     <h2>Cadastro de Hóspedes </h2>
    <div class="principal">

        
        <form id="formHospedes">

        <div class="formulario">
            <div class="grid-01">

                <label> Nome Completo: </label>

                <input type="text" id="nome" placeholder="digite aqui" required>
                <label>RG: </label>
                <input type="text" id="rg" required>
                <label>Email: </label>
                <input type="text" id="email" id="email" required>

                <label>Telefone ( Whatsapp): </label>
                <input type="text" id="telefone" required>
                <label>Data de Nascimento: </label>
                <input type="date" id="data" required>
                <label> CPF: </label>
                <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14">
                <label for=""> Observações Especiais:</label>
            </div>

            <div class="grid-02">
                
                <label>Endereço: </label>
                <input type="text" size="100" id="end">
                <label>Bairro: </label>
                <input type="text" id="bairro">
                <label>Cidade: </label>
                <input type="text" id="cidade">
                <label>Estado: </label>
                <select id="estado">
                    <option value="RJ">RJ</option>
                    <option value="SP">SP</option>
                    <option value="MG">MG</option>
                    <option value="ES">ES</option>
                </select>
                <label>País </label>
                <input type="text" name="pais" id="pais" placeholder="Brasil">
                <label>Número de Acompanhantes:</label>
                <input type="number" value="0" name="Acompanhantes" id="Acompanhantes" min="0" max="4"> 

            </div>
            
        </nav> 
        
        
        <textarea id="msg" placeholder="Digite sua mensagem"></textarea>
        
        </form>

        <input type="button" value="Cadastrar" onclick="cadastrar()">
        <input type="button" value="Página Principal" onclick="homepage()">
        <input type="button" value="Limpar" onclick="limpar()" >

    </div>
    <script src="https://unpkg.com/imask" defer></script>
